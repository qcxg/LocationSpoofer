name: Signed Android Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      publish_release:
        description: Create or update the GitHub Release for the Gradle version
        required: true
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build signed APK and AAB
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve and validate version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION_NAME=$(sed -nE 's/^[[:space:]]*versionName[[:space:]]*=[[:space:]]*"([0-9]+\.[0-9]+\.[0-9]+)".*/\1/p' app/build.gradle.kts | head -n 1)
          VERSION_CODE=$(sed -nE 's/^[[:space:]]*versionCode[[:space:]]*=[[:space:]]*([0-9]+).*/\1/p' app/build.gradle.kts | head -n 1)

          if [[ ! "$VERSION_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || [[ ! "$VERSION_CODE" =~ ^[1-9][0-9]*$ ]]; then
            echo "Invalid versionName/versionCode in app/build.gradle.kts" >&2
            exit 1
          fi

          TAG_NAME="v${VERSION_NAME}"
          if [[ "$GITHUB_REF" == refs/tags/* ]] && [[ "$GITHUB_REF_NAME" != "$TAG_NAME" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match Gradle version $TAG_NAME" >&2
            exit 1
          fi

          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Validate release secrets
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: |
          set -euo pipefail
          missing=0
          for name in KEYSTORE_BASE64 KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD GOOGLE_MAPS_API_KEY; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required GitHub Actions secret: $name" >&2
              missing=1
            fi
          done
          exit "$missing"

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/locationspoofer-release.jks"
          test -s "$RUNNER_TEMP/locationspoofer-release.jks"
          chmod 600 "$RUNNER_TEMP/locationspoofer-release.jks"

      - name: Lint and build signed release
        env:
          KEYSTORE_FILE_PATH: ${{ runner.temp }}/locationspoofer-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon lintRelease assembleRelease bundleRelease

      - name: Collect and verify release files
        id: files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          APK=$(find app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' -print -quit)
          AAB=$(find app/build/outputs/bundle/release -maxdepth 1 -type f -name '*.aab' -print -quit)
          test -n "$APK" && test -n "$AAB"

          APK_OUT="dist/LocationSpoofer-${{ steps.version.outputs.tag }}.apk"
          AAB_OUT="dist/LocationSpoofer-${{ steps.version.outputs.tag }}.aab"
          cp "$APK" "$APK_OUT"
          cp "$AAB" "$AAB_OUT"

          BUILD_TOOLS=$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)
          "$BUILD_TOOLS/apksigner" verify --verbose --print-certs "$APK_OUT"
          jarsigner -verify -certs "$AAB_OUT"
          sha256sum "$APK_OUT" "$AAB_OUT" | tee dist/SHA256SUMS.txt

      - name: Upload signed build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LocationSpoofer-${{ steps.version.outputs.tag }}-signed
          path: dist/*
          if-no-files-found: error
          retention-days: 30

      - name: Prepare release notes
        shell: bash
        run: |
          set -euo pipefail
          VERSION_HEADER="## [${{ steps.version.outputs.name }}]"
          awk -v header="$VERSION_HEADER" '
            index($0, header) == 1 { found = 1; next }
            found && /^## \[/ { exit }
            found { print }
            END { if (!found) exit 1 }
          ' CHANGELOG.md > release-notes.md
          test -s release-notes.md

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.publish_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: LocationSpoofer ${{ steps.version.outputs.tag }}
          body_path: release-notes.md
          files: |
            dist/LocationSpoofer-${{ steps.version.outputs.tag }}.apk
            dist/LocationSpoofer-${{ steps.version.outputs.tag }}.aab
            dist/SHA256SUMS.txt
